<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Rename Folder</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="dark-theme">

<!-- TOP BAR -->
<div class="topbar">
    ✏ Rename Folder
    <div style="display:flex; align-items:center; gap:12px;">
        <span id="themeToggle" style="cursor:pointer;">🌙</span>
        👤 {{ request.user.username }}
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/dashboard/">📁 My Drive</a>
        <a href="/trash/">🗑 Trash</a>
        <a href="/activity/">📊 Activity</a>
        <a href="/accounts/logout/">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- COMPACT CARD -->
        <div class="card" style="
            max-width:420px;
            padding:18px;
        ">

            <!-- HEADER ROW -->
            <div style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                margin-bottom:10px;
            ">
                <strong>Rename folder</strong>

                <!-- 3 DOT MENU -->
                <div class="menu-container">
                    <span class="menu-btn">⋮</span>
                    <div class="menu-dropdown">
                        <a href="/dashboard/">↩ Back</a>
                        <a href="/folder-delete/{{ folder.id }}/" class="danger"
                           onclick="return confirm('Delete this folder?');">
                            🗑 Delete
                        </a>
                    </div>
                </div>
            </div>

            <!-- CURRENT NAME -->
            <div style="font-size:12px; color:#9aa0a6; margin-bottom:6px;">
                Current name
            </div>

            <!-- INPUT -->
            <form method="post">
                {% csrf_token %}
                <input
                    type="text"
                    name="new_name"
                    value="{{ folder.name }}"
                    required
                    style="
                        width:100%;
                        padding:10px;
                        border-radius:8px;
                        border:none;
                        background:#303134;
                        color:#e8eaed;
                        margin-bottom:12px;
                        font-size:14px;
                    "
                >

                <!-- BUTTONS -->
                <div style="display:flex; gap:8px;">
                    <button type="submit" style="flex:1; padding:8px;">
                        Save
                    </button>

                    <a href="/dashboard/"
                       style="
                           flex:1;
                           text-align:center;
                           padding:8px;
                           background:#5f6368;
                           color:#fff;
                           border-radius:18px;
                           text-decoration:none;
                           font-size:14px;
                       ">
                        Cancel
                    </a>
                </div>
            </form>

        </div>

    </div>
</div>

<script>
const body = document.body;
const toggle = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "light") {
    body.classList.remove("dark-theme");
    toggle.textContent = "🌞";
}

toggle.onclick = () => {
    body.classList.toggle("dark-theme");
    toggle.textContent = body.classList.contains("dark-theme") ? "🌙" : "🌞";
    localStorage.setItem("theme", body.classList.contains("dark-theme") ? "dark" : "light");
};
</script>

</body>
</html>
